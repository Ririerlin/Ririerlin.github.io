<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>朱琳 | 个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #f6f8fc, #eef2f7);
            color: #1f2937;
            line-height: 1.8;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            margin: 40px auto;
        }

        .hero {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: white;
            border-radius: 24px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(59, 130, 246, 0.25);
        }

        .hero h1 {
            font-size: 42px;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .hero p {
            font-size: 18px;
            opacity: 0.95;
        }

        .section {
            background: rgba(255, 255, 255, 0.9);
            margin-top: 28px;
            padding: 32px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
            backdrop-filter: blur(8px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .section:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 30px rgba(15, 23, 42, 0.12);
        }

        .section h2 {
            font-size: 24px;
            margin-bottom: 16px;
            color: #2563eb;
            border-left: 5px solid #2563eb;
            padding-left: 12px;
        }

        .about p {
            font-size: 17px;
            color: #374151;
        }

        .interest-list {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            list-style: none;
            margin-top: 10px;
        }

        .interest-list li {
            background: linear-gradient(135deg, #dbeafe, #eff6ff);
            color: #1d4ed8;
            padding: 12px 18px;
            border-radius: 999px;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.08);
        }

        .contact-box {
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            padding: 20px;
            margin-top: 12px;
        }

        .contact-box p {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .contact-box a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }

        .contact-box a:hover {
            text-decoration: underline;
        }

        .footer {
            text-align: center;
            margin: 30px 0 10px;
            color: #6b7280;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .hero {
                padding: 45px 24px;
            }

            .hero h1 {
                font-size: 32px;
            }

            .hero p {
                font-size: 16px;
            }

            .section {
                padding: 24px;
            }

            .section h2 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <section class="hero">
            <h1>你好，我是朱琳</h1>
            <p>工业设计工程专业学生 ｜ 热爱设计、技术与创新</p>
        </section>

        <section class="section about">
            <h2>关于我</h2>
            <p>
                大家好，我是朱琳，一名工业设计工程专业学生。
                我对设计思维、产品创新和数字技术充满兴趣，喜欢在创意与实践中不断探索，
                希望通过设计让生活变得更加美好。
            </p>
        </section>

        <section class="section">
            <h2>我的兴趣</h2>
            <ul class="interest-list">
                <li>人工智能</li>
                <li>编程开发</li>
                <li>阅读写作</li>
                <li>产品设计</li>
                <li>创意思维</li>
            </ul>
        </section>

        <section class="section">
            <h2>联系方式</h2>
            <div class="contact-box">
                <p>欢迎和我交流学习、设计与技术相关的话题。</p>
                <p>邮箱：<a href="mailto:2651281672@qq.com">2651281672@qq.com</a></p>
            </div>
        </section>

        <div class="footer">
            <p>© 2026 朱琳的个人主页 ｜ Powered by GitHub Pages</p>
        </div>
    </div>
</body>
</html>
